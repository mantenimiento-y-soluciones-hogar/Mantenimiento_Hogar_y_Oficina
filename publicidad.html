<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicidad Dinámica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Contenedor del carrusel */
        .carousel-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 0.75rem; /* rounded-xl de Tailwind */
        }

        /* Tira deslizante que contiene las diapositivas */
        .carousel-track {
            display: flex;
            /* Usamos transiciones CSS nativas y suaves */
            transition: transform 0.5s ease-in-out;
            width: 100%;
        }

        /* Cada diapositiva individual */
        .carousel-slide {
            min-width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0f172a; /* Fondo oscuro de relleno */
        }

        .carousel-slide img {
            width: 100%;
            height: auto;
            max-height: 450px;
            object-fit: contain;
        }

        /* Botones de navegación (anterior y posterior) */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            transition: background-color 0.3s, transform 0.2s;
            z-index: 10;
        }

        .nav-btn:hover {
            background-color: rgba(0, 0, 0, 0.8);
            transform: translateY(-50%) scale(1.1);
        }

        .prev-btn { left: 16px; }
        .next-btn { right: 16px; }
    </style>
</head>
<body class="bg-transparent m-0 p-0 flex items-center justify-center min-h-screen">

    <div class="carousel-container shadow-2xl max-w-5xl mx-auto">
        
        <!-- TIRA DESLIZANTE CON LAS IMÁGENES -->
        <div class="carousel-track" id="carouselTrack">
            <!-- NOTA: Reemplaza o añade aquí tus imágenes reales en las etiquetas <img> -->
            <div class="carousel-slide">
                <img src="img_carrusel_1.jpg" alt="Servicio Técnico 1">
            </div>
            <div class="carousel-slide">
                <img src="img_carrusel_2.jpg" alt="Servicio Técnico 2">
            </div>
            <div class="carousel-slide">
                <img src="img_carrusel_3.jpg" alt="Servicio Técnico 3">
            </div>
            <div class="carousel-slide">
                <img src="img_carrusel_4.jpg" alt="Servicio Técnico 4">
            </div>
        </div>

        <!-- BOTONES DE NAVEGACIÓN IZQUIERDA Y DERECHA -->
        <button class="nav-btn prev-btn" id="prevBtn">‹</button>
        <button class="nav-btn next-btn" id="nextBtn">›</button>

    </div>

    <!-- SCRIPT DE DESLIZAMIENTO INFINITO (SIN RETROCESO) -->
    <script>
        const track = document.getElementById('carouselTrack');
        const slides = Array.from(track.children);
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        let currentIndex = 1; // Empezamos en 1 debido a la clonación técnica inicial
        let isTransitioning = false;
        const autoPlayInterval = 4000; // Tiempo de cambio automático (4 segundos)
        let timer;

        // --- EXPLICACIÓN DEL TRUCO INFINITO ---
        // Clonamos la primera imagen y la ponemos al final. 
        // Clonamos la última imagen y la ponemos al principio.
        // Esto permite un truco visual para que la transición parezca infinita y nunca retroceda de golpe.
        const firstClone = slides[0].cloneNode(true);
        const lastClone = slides[slides.length - 1].cloneNode(true);

        track.appendChild(firstClone);
        track.insertBefore(lastClone, slides[0]);

        // Actualizamos la lista de diapositivas incluyendo los clones
        const allSlides = Array.from(track.children);
        
        // Ajustamos la posición inicial al primer elemento real (índice 1) sin animar
        track.style.transition = 'none';
        track.style.transform = `translateX(-${currentIndex * 100}%)`;

        function updateSlidePosition() {
            track.style.transition = 'transform 0.5s ease-in-out';
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
        }

        // Evento que se ejecuta al terminar la animación de desplazamiento
        track.addEventListener('transitionend', () => {
            isTransitioning = false;
            
            // Si llegamos al clon del final (que es idéntico a la imagen 1),
            // saltamos instantáneamente a la imagen 1 real desactivando la animación.
            if (currentIndex === allSlides.length - 1) {
                track.style.transition = 'none';
                currentIndex = 1;
                track.style.transform = `translateX(-${currentIndex * 100}%)`;
            }
            
            // Si llegamos al clon del principio (que es idéntico a la última imagen),
            // saltamos instantáneamente a la última imagen real desactivando la animación.
            if (currentIndex === 0) {
                track.style.transition = 'none';
                currentIndex = allSlides.length - 2;
                track.style.transform = `translateX(-${currentIndex * 100}%)`;
            }
        });

        function moveToNext() {
            if (isTransitioning) return;
            isTransitioning = true;
            currentIndex++;
            updateSlidePosition();
            resetTimer();
        }

        function moveToPrev() {
            if (isTransitioning) return;
            isTransitioning = true;
            currentIndex--;
            updateSlidePosition();
            resetTimer();
        }

        // Controladores de eventos para los botones físicos
        nextBtn.addEventListener('click', moveToNext);
        prevBtn.addEventListener('click', moveToPrev);

        // Control de reproducción automática (Auto-play)
        function startTimer() {
            timer = setInterval(moveToNext, autoPlayInterval);
        }

        function resetTimer() {
            clearInterval(timer);
            startTimer();
        }

        // Iniciar el temporizador al cargar la página
        startTimer();
    </script>
</body>
</html>
