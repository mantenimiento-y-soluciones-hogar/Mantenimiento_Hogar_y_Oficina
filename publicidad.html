<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-transparent m-0 p-0 overflow-hidden">

    <div class="relative w-full max-w-5xl mx-auto overflow-hidden rounded-xl shadow-lg group">
        <!-- Contenedor del Carrusel -->
        <div id="carousel-track" class="flex transition-transform duration-700 ease-in-out w-full h-[300px] md:h-[450px]">
            <!-- Las imágenes se cargarán dinámicamente aquí -->
            <div class="w-full flex-shrink-0 flex items-center justify-center bg-gray-100 text-gray-500">
                <span class="animate-pulse">Cargando publicidad desde GitHub...</span>
            </div>
        </div>

        <!-- Botón Izquierdo (Atrás) -->
        <button id="prev-btn" class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/70 text-white rounded-full p-2 md:p-3 transition opacity-0 group-hover:opacity-100 focus:outline-none z-10">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>

        <!-- Botón Derecho (Adelante) -->
        <button id="next-btn" class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/70 text-white rounded-full p-2 md:p-3 transition opacity-0 group-hover:opacity-100 focus:outline-none z-10">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>

        <!-- Indicadores (Puntitos) -->
        <div id="carousel-indicators" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-2 z-10"></div>
    </div>

    <script>
        // CONFIGURACIÓN DE GITHUB CORREGIDA Y REVISADA
        const USER_GITHUB = "mantenimiento-y-soluciones-hogar"; 
        const REPO_GITHUB = "Mantenimiento_Hogar_y_Oficina";   
        const BRANCH = "main"; 

        const track = document.getElementById('carousel-track');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const indicatorsContainer = document.getElementById('carousel-indicators');

        let images = [];
        let currentIndex = 0;
        let autoPlayInterval = null;
        let resumeTimeout = null;

        // 1. Obtener imágenes automáticamente mediante la API de GitHub
        async function fetchImages() {
            try {
                const response = await fetch(`https://api.github.com/repos/${USER_GITHUB}/${REPO_GITHUB}/contents/?ref=${BRANCH}`);
                if (!response.ok) throw new Error("Error consultando la API");
                const files = await response.json();
                
                // Filtrar archivos que terminen en .jpg o .jpeg (insensible a mayúsculas/minúsculas)
                images = files
                    .filter(file => {
                        const name = file.name.toLowerCase();
                        return name.endsWith('.jpg') || name.endsWith('.jpeg');
                    })
                    .map(file => file.download_url);

                if (images.length === 0) {
                    track.innerHTML = `<div class="w-full flex-shrink-0 flex items-center justify-center bg-gray-100 text-red-500 font-semibold">No se encontraron archivos .jpg o .jpeg en la rama ${BRANCH}</div>`;
                    return;
                }

                initCarousel();
            } catch (error) {
                console.error("Error al cargar las imágenes:", error);
                track.innerHTML = `<div class="w-full flex-shrink-0 flex items-center justify-center bg-gray-100 text-red-500 font-semibold text-center p-4">Error de conexión con GitHub o límite de consultas alcanzado.</div>`;
            }
        }

        // 2. Inicializar componentes del carrusel
        function initCarousel() {
            track.innerHTML = '';
            indicatorsContainer.innerHTML = '';

            images.forEach((src, idx) => {
                // Crear imagen
                const slide = document.createElement('div');
                slide.className = "w-full flex-shrink-0 h-full bg-gray-900 flex justify-center items-center";
                slide.innerHTML = `<img src="${src}" alt="Publicidad" class="w-full h-full object-contain">`;
                track.appendChild(slide);

                // Crear puntito indicador
                const dot = document.createElement('button');
                dot.className = `w-3 h-3 rounded-full transition ${idx === 0 ? 'bg-white' : 'bg-white/40'}`;
                dot.addEventListener('click', () => {
                    goToSlide(idx);
                    userInteraction();
                });
                indicatorsContainer.appendChild(dot);
            });

            startAutoplay();
        }

        // 3. Moverse a un slide en concreto
        function goToSlide(index) {
            if (images.length === 0) return;
            
            if (index >= images.length) {
                currentIndex = 0;
            } else if (index < 0) {
                currentIndex = images.length - 1;
            } else {
                currentIndex = index;
            }

            // Desplazar horizontalmente
            track.style.transform = `translateX(-${currentIndex * 100}%)`;

            // Actualizar puntitos
            const dots = indicatorsContainer.querySelectorAll('button');
            dots.forEach((dot, idx) => {
                if (idx === currentIndex) {
                    dot.classList.replace('bg-white/40', 'bg-white');
                } else {
                    dot.classList.replace('bg-white', 'bg-white/40');
                }
            });
        }

        // 4. Controles de Autoplay e Interacción del Usuario
        function startAutoplay() {
            stopAutoplay();
            autoPlayInterval = setInterval(() => {
                goToSlide(currentIndex + 1);
            }, 3000); // 3 Segundos de intervalo automático
        }

        function stopAutoplay() {
            if (autoPlayInterval) clearInterval(autoPlayInterval);
        }

        function userInteraction() {
            stopAutoplay();
            if (resumeTimeout) clearTimeout(resumeTimeout);
            
            // Si pasan 2 segundos sin interactuar, reanudar autoplay
            resumeTimeout = setTimeout(() => {
                startAutoplay();
            }, 2000); 
        }

        // Eventos Manuales
        prevBtn.addEventListener('click', () => {
            goToSlide(currentIndex - 1);
            userInteraction();
        });

        nextBtn.addEventListener('click', () => {
            goToSlide(currentIndex + 1);
            userInteraction();
        });

        // Iniciar carga
        fetchImages();
    </script>
</body>
</html>
